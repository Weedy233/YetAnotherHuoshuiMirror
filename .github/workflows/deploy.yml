name: Deploy Cloudflare mirror

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Test, build, and deploy
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
      CF_D1_DATABASE_NAME: ${{ vars.CF_D1_DATABASE_NAME }}
      CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.14

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test with coverage
        run: bun run test

      - name: Build web and API
        run: bun run build

      - name: Deploy Worker API
        run: bun run --cwd apps/api deploy

      - name: Deploy Pages frontend
        run: bunx wrangler pages deploy apps/web/dist --project-name "${CF_PAGES_PROJECT_NAME:-huoshui-mirror-web}" --branch main
